{% extends "base.html" %}

{% block content %}
<style>
.stockout-page .stock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 18px;
    margin-bottom: 30px;
    min-height: 200px;
}

.stockout-page .stock-item {
    position: relative;
    padding: 28px 18px;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: bold;
    color: white;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.25);
    animation: fadeIn 0.5s ease;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    cursor: default;
}

.stockout-page .stock-item:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.25);
}

.stockout-page .stock-item .delete-btn {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.3);
    color: white;
    border: none;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.3s;
}

.stockout-page .stock-item .delete-btn:hover {
    background: rgba(255,0,0,0.7);
}

.stockout-page .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 50px 20px;
    color: #999;
    font-size: 1.3rem;
}

.stockout-page .input-section {
    background: white;
    padding: 24px;
    border-radius: 14px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
}

.stockout-page .input-group {
    display: flex;
    gap: 12px;
    align-items: center;
}

.stockout-page .input-group input {
    flex: 1;
    padding: 12px 18px;
    font-size: 1.1rem;
    border: 2px solid #ddd;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.3s;
}

.stockout-page .input-group input:focus {
    border-color: #667eea;
}

.stockout-page .input-group button {
    padding: 12px 32px;
    font-size: 1.1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}

.stockout-page .input-group button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.85); }
    to { opacity: 1; transform: scale(1); }
}

@keyframes slideOut {
    from { opacity: 1; transform: scale(1); }
    to { opacity: 0; transform: scale(0.85); }
}

.stockout-page .stock-item.removing {
    animation: slideOut 0.3s ease forwards;
}
</style>

<div class="stockout-page">
    <div class="card">
        <h2 class="card-title">🚫 当前缺货</h2>

        <div class="stock-grid" id="stockGrid">
            <div class="empty-state" id="emptyState">
                <div style="font-size: 3rem; margin-bottom: 12px;">📭</div>
                <div>暂无缺货商品</div>
                <div style="font-size: 0.9rem; margin-top: 8px; color: #bbb;">在下方输入商品名称添加</div>
            </div>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input type="text" id="itemInput" placeholder="输入缺货商品名称..." autocomplete="off">
                <button onclick="addItem()">✅ 确认添加</button>
            </div>
        </div>
    </div>
</div>

<script>
    const colors = [
        'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
        'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
        'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
        'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
        'linear-gradient(135deg, #30cfd0 0%, #330867 100%)',
        'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)',
        'linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)',
        'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)',
        'linear-gradient(135deg, #ff6e7f 0%, #bfe9ff 100%)',
        'linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%)'
    ];

    // 从模板传入的商品列表
    let stockItems = {{ items | tojson }};

    function renderItems() {
        const grid = document.getElementById('stockGrid');
        grid.innerHTML = '';

        if (stockItems.length === 0) {
            grid.innerHTML = '<div class="empty-state" id="emptyState"><div style="font-size: 3rem; margin-bottom: 12px;">📭</div><div>暂无缺货商品</div><div style="font-size: 0.9rem; margin-top: 8px; color: #bbb;">在下方输入商品名称添加</div></div>';
            return;
        }

        stockItems.forEach(function(item) {
            const div = document.createElement('div');
            div.className = 'stock-item';
            div.style.background = item.color;
            div.innerHTML = '<button class="delete-btn" onclick="deleteItem(' + item.id + ')">×</button><span>' + item.name + '</span>';
            grid.appendChild(div);
        });
    }

    function addItem() {
        const input = document.getElementById('itemInput');
        const name = input.value.trim();
        if (!name) {
            alert('请输入商品名称');
            return;
        }
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        fetch('/stockout/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'name=' + encodeURIComponent(name) + '&color=' + encodeURIComponent(color)
        }).then(function(r) { return r.json(); })
          .then(function(data) {
            if (data.success) { location.reload(); }
            else { alert('添加失败：' + (data.error || '未知错误')); }
          }).catch(function(err) { alert('网络错误，请刷新页面重试'); });

        input.value = '';
        input.focus();
    }

    function deleteItem(id) {
        if (!confirm('确定要删除这个缺货记录吗？')) return;
        fetch('/stockout/delete/' + id, {method: 'POST'})
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) { location.reload(); }
                else { alert('删除失败：' + (data.error || '未知错误')); }
            }).catch(function(err) { alert('网络错误，请刷新页面重试'); });
    }

    document.getElementById('itemInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') addItem();
    });

    renderItems();
</script>
{% endblock %}
